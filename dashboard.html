<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ben Lalez Team</title><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#F7F5F1;--bg2:#fff;--bg3:#F2EFE9;--border:#E4DFD7;--border2:#CCC5BA;--text:#1A1814;--text2:#6B6459;--text3:#A89E93;--amber:#B8720E;--ambg:#FDF3E3;--ambd:#F0D5A0;--green:#2A7040;--grbg:#EBF5EF;--coral:#B84030;--cobg:#FDF0EE;--blue:#2855A8;--blbg:#EEF2FB;--purple:#5E3FB0;--pubg:#F2EEF9;--teal:#0F7A6B;--tebg:#E8F5F3;--font:'DM Sans',system-ui,sans-serif;--serif:'Fraunces',Georgia,serif;--sh:0 1px 3px rgba(0,0,0,.06)}html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px}.hdr{display:flex;align-items:center;padding:0 24px;height:54px;background:var(--bg2);border-bottom:1px solid var(--border);gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}.logo{font-family:var(--serif);font-size:17px;font-weight:300;white-space:nowrap}.logo em{color:var(--amber);font-style:italic}.tabs{display:flex;gap:2px}.tab{padding:6px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border:none;background:none;font-family:var(--font);transition:all .18s}.tab:hover{background:var(--bg3)}.tab.active{background:var(--text);color:#fff}.hr{margin-left:auto;display:flex;align-items:center;gap:14px}.live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-weight:500}.lp{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pg 2s infinite}@keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(42,112,64,.4)}50%{box-shadow:0 0 0 5px rgba(42,112,64,0)}}.clk{font-size:12px;color:var(--text3)}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:20px 24px 0}.mc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;box-shadow:var(--sh);transition:all .2s}.mc:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.1)}.mct{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.mcl{font-size:10.5px;color:var(--text3);font-weight:500;letter-spacing:.05em;text-transform:uppercase}.mtr{font-size:11px;font-weight:500}.tu{color:var(--green)}.tf{color:var(--text3)}.ta{color:var(--coral)}.mv{font-family:var(--serif);font-size:30px;font-weight:300;color:var(--text);line-height:1;margin-bottom:6px}.mx{font-size:11.5px;color:var(--text2);line-height:1.45}.brief{margin:16px 24px 0;background:var(--ambg);border:1px solid var(--ambd);border-radius:10px;padding:14px 18px;display:flex;align-items:flex-start;gap:12px}.bw{font-size:10.5px;font-weight:500;color:var(--amber);white-space:nowrap;padding-top:2px}.bt{font-size:13px;color:var(--text);line-height:1.5;flex:1}.bt strong{font-weight:500}.bcs{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;max-width:240px}.bc{padding:4px 11px;border-radius:20px;border:1px solid var(--ambd);font-size:11px;color:var(--amber);background:rgba(184,114,14,.06);font-family:var(--font)}.bc.al{border-color:#F0C0B8;color:var(--coral);background:rgba(184,64,48,.05)}.grid{display:grid;grid-template-columns:1fr 340px;gap:16px;padding:16px 24px 32px}.left{display:flex;flex-direction:column;gap:16px}.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;box-shadow:var(--sh)}.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.st{font-size:13px;font-weight:500}.ss{font-size:11px;color:var(--text3)}.bdg{font-size:10.5px;background:rgba(184,114,14,.1);color:var(--amber);padding:2px 8px;border-radius:10px;font-weight:500}.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.ac{border:1px solid var(--border);border-radius:9px;padding:0 14px 14px;cursor:pointer;transition:all .18s;background:var(--bg);position:relative;overflow:hidden}.ac:hover{border-color:var(--border2);background:var(--bg2);box-shadow:var(--sh)}.acb{height:3px;border-radius:9px 9px 0 0;margin:0 -14px 12px}.act{display:flex;align-items:center;gap:10px;margin-bottom:10px}.av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;font-family:var(--serif);font-style:italic}.an{font-size:13px;font-weight:500}.ar{font-size:10.5px;color:var(--text3);margin-top:1px}.as{display:flex;align-items:center;gap:5px;margin-bottom:7px}.pip{width:5px;height:5px;border-radius:50%}.pa{background:var(--green);animation:pg 2s infinite}.ps{background:var(--amber)}.pw{background:var(--text3)}.pk{background:var(--blue);animation:pb 1.5s infinite}.pau{background:var(--purple);animation:pp 2.5s infinite}@keyframes pb{0%,100%{opacity:1}50%{opacity:.35}}@keyframes pp{0%,100%{opacity:1}50%{opacity:.25}}.asl{font-size:10.5px;font-weight:500}.atk{font-size:11.5px;color:var(--text2);line-height:1.4;margin-bottom:4px}.ala{font-size:11px;color:var(--text3);line-height:1.3}.dbs{display:flex;gap:12px;flex-wrap:wrap;border-top:1px solid var(--border);margin-top:14px;padding-top:14px}.db{text-align:center;flex:1;min-width:70px}.dbv{font-family:var(--serif);font-size:20px;font-weight:300}.dbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}.qi{border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;background:var(--bg);transition:all .15s}.qi:last-child{margin-bottom:0}.qi:hover{border-color:var(--border2)}.qi.pr{border-color:#F0C0B8;background:var(--cobg)}.qit{display:flex;align-items:center;gap:6px;margin-bottom:4px}.qif{font-size:10.5px;font-weight:500}.qiy{font-size:10.5px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:1px 7px;border-radius:4px}.qig{font-size:10.5px;color:var(--coral);font-weight:500}.qim{font-size:10.5px;color:var(--text3);margin-left:auto}.qin{font-size:13px;font-weight:500;margin-bottom:2px}.qip{font-size:11.5px;color:var(--text2);margin-bottom:10px}.qia{display:flex;gap:7px}.bok{padding:5px 14px;background:var(--grbg);border:1px solid rgba(42,112,64,.25);color:var(--green);border-radius:6px;font-size:11.5px;cursor:pointer;font-family:var(--font);font-weight:500}.bok:hover{background:rgba(42,112,64,.18)}.bno{padding:5px 14px;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:6px;font-size:11.5px;cursor:pointer;font-family:var(--font)}.bno:hover{border-color:var(--coral);color:var(--coral)}.emp{padding:24px;text-align:center;color:var(--text3);font-size:12px}.fi{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}.fav{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;font-style:italic;font-family:var(--serif)}.fb{flex:1;min-width:0}.fn{font-size:12px;font-weight:500}.fa{font-size:11.5px;color:var(--text2);line-height:1.4}.fa.al{color:var(--coral)}.ft{font-size:10.5px;color:var(--text3);white-space:nowrap;flex-shrink:0;padding-top:2px}.pw{padding:48px 24px;text-align:center}.pwt{font-family:var(--serif);font-size:24px;font-weight:300;margin-bottom:10px}.pws{font-size:13px;color:var(--text2);line-height:1.6;max-width:480px;margin:0 auto 24px}.pwa{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:28px}.pa2{padding:6px 14px;border:1px dashed var(--border2);border-radius:20px;font-size:12px;color:var(--text3)}</style></head><body><div id="app"></div><script>
const AG=[
{name:'Oliver',role:'Orchestrator',color:'#B8720E',bg:'#FDF3E3',pip:'pa',sl:'Active now',slc:'#2A7040',task:"Building your morning brief from Roger's overnight research",last:'Flagged LLM visibility gap — 0 citations across all 8 AI platforms',av:'O'},
{name:'Roger',role:'Research',color:'#0F7A6B',bg:'#E8F5F3',pip:'ps',sl:'Runs at 2AM',slc:'#B8720E',task:'Nightly brief scheduled — fires in approx 4 hours',last:'Analyzed competitor posts across top Chicago agents. 3 content gaps found.',av:'R'},
{name:'Webster',role:'Discovery',color:'#2855A8',bg:'#EEF2FB',pip:'pw',sl:'Waiting on Roger',slc:'#6B6459',task:"Holding until Roger's brief is ready — then runs full LLM audit",last:'Confirmed: 0 of 48 queries return benlalez.com on any AI platform',av:'W'},
{name:'Sarah',role:'Social · 6 platforms',color:'#B84030',bg:'#FDF0EE',pip:'pk',sl:'Working',slc:'#2855A8',task:'Filming brief sent Thursday. 4 posts queued for your approval.',last:'Price reveal series ready — Instagram Reel and TikTok formats',av:'S'},
{name:'Peter',role:'Paid Ads · $2,500/mo',color:'#2A7040',bg:'#EBF5EF',pip:'pau',sl:'Researching',slc:'#5E3FB0',task:'Pre-launch research protocol day 3 of 21 — Google Search campaign',last:'40 ROI intelligence records in database. 9 platforms researched.',av:'P'},
{name:'Emille',role:'Email · 8 segments',color:'#5E3FB0',bg:'#F2EEF9',pip:'pau',sl:'Audit pending',slc:'#5E3FB0',task:'Needs Chrome access to audit 100 past Compass emails before acting',last:'All 8 segments mapped: past clients, buyers, sellers, investors + more',av:'E'}];
const FD=[
{agent:'Orchestrator',color:'#B8720E',action:'Railway agent run #414 logged successfully',time:'7:27 PM',alert:false},
{agent:'Roger',color:'#0F7A6B',action:'3 content gaps found — no Chicago agent covers contractor renovation ROI',time:'2:14 AM',alert:false},
{agent:'Webster',color:'#2855A8',action:'ALERT: 0 of 48 LLM queries surface benlalez.com — critical gap',time:'2:31 AM',alert:true},
{agent:'Oliver',color:'#B8720E',action:'Morning brief compiled. 3 priorities flagged. 4 items queued for Ben.',time:'6:30 AM',alert:false},
{agent:'Sarah',color:'#B84030',action:'Filming brief sent via Telegram. Shot list: 4 videos, 45 minutes.',time:'8:00 AM',alert:false},
{agent:'Peter',color:'#2A7040',action:'Competitor keyword gap analysis — 14 opportunities identified',time:'9:15 AM',alert:false},
{agent:'Emille',color:'#5E3FB0',action:'8 database segments written to Supabase. Audit pending.',time:'10:02 AM',alert:false}];
let tab='marketing';
let queue=[
{id:1,from:'Sarah',fc:'#B84030',type:'Instagram Reel',title:'Price reveal — 5bd Wicker Park greystone',prev:'Can you guess what this sold for? Drop your guess below.',time:'2h ago',pr:false},
{id:2,from:'Sarah',fc:'#B84030',type:'TikTok',title:'Deal killers — rated. No filter.',prev:'5 things that actually blow up real estate deals in Chicago.',time:'3h ago',pr:false},
{id:3,from:'Emille',fc:'#5E3FB0',type:'Email · 47 past clients',title:'March market touch — past client VIP list',prev:'Neighborhood-specific data for 47 past clients.',time:'5h ago',pr:false},
{id:4,from:'Webster',fc:'#2855A8',type:'Blog Post',title:'Lincoln Park 2026 buyer guide — AEO optimized',prev:'FAQPage schema. Targets all 8 LLM citation patterns.',time:'6h ago',pr:true}];
function gt(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}
function ac(a){return`<div class="ac"><div class="acb" style="background:${a.color}"></div><div class="act"><div class="av" style="background:${a.bg};color:${a.color}">${a.av}</div><div><div class="an">${a.name}</div><div class="ar">${a.role}</div></div></div><div class="as"><div class="pip ${a.pip}"></div><span class="asl" style="color:${a.slc}">${a.sl}</span></div><div class="atk">${a.task}</div><div class="ala">${a.last}</div></div>`}
function qi(q){return`<div class="qi${q.pr?' pr':''}" id="qi${q.id}"><div class="qit"><span class="qif" style="color:${q.fc}">${q.from}</span><span class="qiy">${q.type}</span>${q.pr?'<span class="qig">↑ Priority</span>':''}<span class="qim">${q.time}</span></div><div class="qin">${q.title}</div><div class="qip">${q.prev}</div><div class="qia"><button class="bok" onclick="ok(${q.id})">Approve</button><button class="bno" onclick="no(${q.id})">Send back</button></div></div>`}
function fi(f){return`<div class="fi"><div class="fav" style="background:${f.color}18;color:${f.color}">${f.agent[0]}</div><div class="fb"><div class="fn">${f.agent}</div><div class="fa${f.alert?' al':''}">${f.action}</div></div><div class="ft">${f.time}</div></div>`}
function render(){
let c='';
if(tab==='marketing'){c=`<div class="metrics"><div class="mc"><div class="mct"><span class="mcl">Active leads</span><span class="mtr tu">↑ +2 this week</span></div><div class="mv">4</div><div class="mx">Two new leads from organic search. None from paid yet — Peter hasn't launched.</div></div><div class="mc"><div class="mct"><span class="mcl">Content queued</span><span class="mtr tf">→ 4 need sign-off</span></div><div class="mv">33</div><div class="mx">Sarah has 4 posts ready. AEO blog calendar starts March 28.</div></div><div class="mc"><div class="mct"><span class="mcl">LLM visibility</span><span class="mtr ta">⚠ Critical</span></div><div class="mv">0%</div><div class="mx">Not appearing in any of 8 platforms' test queries. Top priority.</div></div><div class="mc"><div class="mct"><span class="mcl">Ad spend</span><span class="mtr tf">→ Not launched</span></div><div class="mv">$0</div><div class="mx">Peter is on day 3 of 21-day research protocol. No spend yet.</div></div><div class="mc"><div class="mct"><span class="mcl">System logs</span><span class="mtr tu">↑ Live</span></div><div class="mv">414</div><div class="mx">Railway orchestrator logging continuously. System is running.</div></div></div><div class="brief"><div class="bw">Oliver</div><div class="bt"><strong>Your top 3 today:</strong> LLM visibility is at zero — the AEO content calendar starts in 2 days. You have 4 things in the approval queue. Connecting the FUB API key unlocks David's entire system.</div><div class="bcs"><span class="bc">4 need your sign-off</span><span class="bc">Film this week</span><span class="bc al">FUB API key needed</span></div></div><div class="grid"><div class="left"><div class="sbox"><div class="sh"><div class="st">Your marketing team</div><div class="ss">5 agents defined · reading Roger's nightly brief</div></div><div class="ag">${AG.map(ac).join('')}</div><div class="dbs"><div class="db"><div class="dbv">37</div><div class="dbl">Brand memory</div></div><div class="db"><div class="dbv">19</div><div class="dbl">Directories</div></div><div class="db"><div class="dbv">40</div><div class="dbl">Ads research</div></div><div class="db"><div class="dbv">8</div><div class="dbl">Email segments</div></div><div class="db"><div class="dbv">8</div><div class="dbl">LLM platforms</div></div></div></div><div class="sbox"><div class="sh"><div class="st">Waiting for you</div><div class="ss" id="qc">${queue.length} things need your sign-off</div></div><div id="ql">${queue.map(qi).join('')}</div></div></div><div><div class="sbox"><div class="sh"><div class="st">What happened today</div><div class="bdg">Live</div></div>${FD.map(fi).join('')}</div></div></div>`;}
else{const w=tab==='sales'?{who:'David',ag:['Scout','Dash','Coach','Atlas','Intel'],why:"David's pipeline intelligence"}:{who:'Remy',ag:['Tempo','Vend','Ledger','Echo','Shield'],why:"Remy's transaction health system"};c=`<div class="pw"><div class="pwt">${w.who}'s workspace is almost ready</div><div class="pws">Define these 5 agents and connect the FUB API key to unlock ${w.why}.</div><div class="pwa">${w.ag.map(n=>`<div class="pa2">${n}</div>`).join('')}</div></div>`;}
document.getElementById('app').innerHTML=`<div><div class="hdr"><div class="logo">Ben Lalez <em>Team</em></div><div class="tabs"><button class="tab${tab==='marketing'?' active':''}" onclick="st('marketing')">Marketing</button><button class="tab${tab==='sales'?' active':''}" onclick="st('sales')">Sales</button><button class="tab${tab==='ops'?' active':''}" onclick="st('ops')">Operations</button></div><div class="hr"><div class="live"><div class="lp"></div>System live</div><div class="clk" id="clk">${gt()}</div></div></div>${c}</div>`;
setInterval(()=>{const x=document.getElementById('clk');if(x)x.textContent=gt();},30000);}
window.st=t=>{tab=t;render()};
window.ok=id=>{queue=queue.filter(q=>q.id!==id);const l=document.getElementById('ql');const c=document.getElementById('qc');if(l)l.innerHTML=queue.length?queue.map(qi).join(''):'<div class="emp">Nothing waiting — you\'re all clear.</div>';if(c)c.textContent=queue.length?`${queue.length} things need your sign-off`:'All clear';};
window.no=id=>{const e=document.getElementById('qi'+id);if(e){e.style.opacity='.3';e.style.pointerEvents='none';setTimeout(()=>window.ok(id),600);}};
render();
</script></body></html>
