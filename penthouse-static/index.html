<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Penthouse &#8212; Ben Lalez Team</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF9;--card:#FFFFFF;
  --border:#E5E4E0;
  --text:#1A1A18;--text2:#6B6A65;--text3:#A3A09A;
  --amber:#BA7517;--ambg:#FFF9F0;
  --green:#2D7A45;--grbg:#F0F8F3;
  --coral:#C4402E;--cobg:#FDF0EE;
  --blue:#2855A8;--blbg:#EEF2FB;
  --purple:#5E3FB0;--teal:#0F7A6B;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --serif:'Instrument Serif',Georgia,serif;
  --radius:12px;--radius-sm:8px
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13.5px;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ===== HEADER ===== */
.hdr{display:flex;align-items:center;padding:0 28px;height:52px;background:var(--card);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-family:var(--serif);font-size:18px;font-weight:400;letter-spacing:-0.01em;color:var(--text)}
.persona-tabs{display:flex;gap:2px;position:absolute;left:50%;transform:translateX(-50%)}
.ptab{padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text2);border:none;background:none;font-family:var(--font);transition:all .15s;position:relative}
.ptab:hover{background:#F0EFED}.ptab.active{background:var(--text);color:#fff}
.ptab .badge{position:absolute;top:0px;right:1px;min-width:15px;height:15px;border-radius:8px;background:var(--coral);color:#fff;font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;padding:0 4px}
.hr2{margin-left:auto;display:flex;align-items:center;gap:16px}
.live{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--green);font-weight:500}
.lp{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pg 2s infinite}
@keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(45,122,69,.35)}50%{box-shadow:0 0 0 4px rgba(45,122,69,0)}}
.clk{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
.rfbtn{padding:5px 12px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--card);font-size:11.5px;color:var(--text2);cursor:pointer;font-family:var(--font);font-weight:500;transition:background .15s}
.rfbtn:hover{background:#F5F4F2}

/* ===== BRIEF HERO ===== */
.brief{margin:28px 28px 0;padding:24px 28px;border-left:3px solid var(--amber);background:var(--card);border-radius:0 var(--radius) var(--radius) 0;border-top:0.5px solid var(--border);border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
.bw{font-size:10px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.bt{font-size:13.5px;line-height:1.65;color:var(--text2)}
.bt strong{font-family:var(--serif);font-size:20px;font-weight:400;color:var(--text);display:block;line-height:1.35;margin-bottom:6px}

/* ===== METRIC STRIP ===== */
.metrics{display:flex;gap:0;padding:20px 28px 0}
.mc{flex:1;padding:16px 20px}
.mc:not(:last-child){border-right:0.5px solid var(--border)}
.mct{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.mcl{font-size:10.5px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.mtr{font-size:10.5px;font-weight:500}.tu{color:var(--green)}.tf{color:var(--text3)}.ta{color:var(--coral)}.tw{color:var(--amber)}
.mv{font-size:26px;font-weight:600;line-height:1;margin-bottom:2px;letter-spacing:-0.02em}
.mx{font-size:11.5px;color:var(--text3);line-height:1.3}

/* ===== LAYOUT ===== */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px 28px 24px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.left{display:flex;flex-direction:column;gap:20px}
.right{display:flex;flex-direction:column;gap:20px}
.full-width{padding:0 28px 0;margin-top:20px}

/* ===== SECTION BOX ===== */
.sbox{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px 24px}
.sh2{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.st{font-size:13.5px;font-weight:600;letter-spacing:-0.01em}.ss{font-size:11.5px;color:var(--text3)}
.bdg{font-size:10.5px;color:var(--amber);font-weight:500}
.bdg.gr{color:var(--green)}

/* ===== AGENT GRID ===== */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--border);border-radius:var(--radius-sm);overflow:hidden;border:0.5px solid var(--border)}
.ac{padding:16px 18px;cursor:pointer;transition:background .15s;background:var(--card);position:relative}
.ac:hover{background:#FAFAF9}
.ac:hover .cbtn{opacity:1}
.acb{display:none}
.act{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;font-family:var(--serif)}
.an{font-size:13px;font-weight:500}.ar{font-size:11px;color:var(--text3);margin-top:1px}
.as{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.pip{width:5px;height:5px;border-radius:50%}
.p-h{background:var(--green)}.p-d{background:var(--amber);animation:pf 1.5s infinite}.p-e{background:var(--coral)}.p-u{background:var(--text3)}
@keyframes pf{0%,100%{opacity:1}50%{opacity:.4}}
.asl{font-size:10.5px;font-weight:500}
.atk{font-size:11.5px;color:var(--text2);line-height:1.4;margin-bottom:2px}
.ala{font-size:11px;color:var(--text3);line-height:1.3}
.cbtn{margin-top:8px;width:100%;padding:5px;background:var(--bg);border:0.5px solid var(--border);border-radius:6px;font-size:11px;font-family:var(--font);color:var(--text2);cursor:pointer;transition:all .15s;opacity:0}
.cbtn:hover{background:var(--text);color:#fff;border-color:var(--text)}
.ferr{font-size:10.5px;color:var(--coral);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px}

/* ===== INBOX ===== */
.inb{padding:14px 0;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .1s}
.inb:last-child{border-bottom:none}
.inb:hover{background:#FAFAF9;margin:0 -24px;padding:14px 24px}
.inb.unread .inbs{font-weight:600}
.inbt{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.inbf{font-size:10.5px;font-weight:600;color:var(--amber)}
.inbs{font-size:13px;font-weight:500;margin-bottom:2px;line-height:1.3}
.inbp{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.inbm{font-size:10.5px;color:var(--text3);margin-left:auto;flex-shrink:0}

/* ===== DIRECTIVES ===== */
.di{padding:14px 0;border-bottom:0.5px solid var(--border)}
.di:last-child{border-bottom:none}
.dit{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.din{font-size:13px;font-weight:500}
.dib{display:inline-flex;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:4px}
.dib.urg{color:var(--coral);background:var(--cobg)}
.dib.high{color:var(--amber);background:var(--ambg)}
.dib.norm{color:var(--text3);background:#F0EFED}
.dip{font-size:12px;color:var(--text2);line-height:1.5}
.dim{font-size:10.5px;color:var(--text3);margin-left:auto;flex-shrink:0}

/* ===== APPROVAL QUEUE ===== */
.qi{padding:14px 0;border-bottom:0.5px solid var(--border)}
.qi:last-child{border-bottom:none}
.qi.pr{}.qit{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.qif{font-size:10.5px;font-weight:500}
.qiy{font-size:10px;color:var(--text3);background:#F0EFED;padding:1px 7px;border-radius:4px;font-weight:500}
.qig{font-size:10px;color:var(--coral);font-weight:600}
.qim{font-size:10.5px;color:var(--text3);margin-left:auto}
.qin{font-size:13px;font-weight:500;margin-bottom:2px}
.qip{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.qia{display:flex;gap:7px}
.bok{padding:5px 14px;background:var(--grbg);border:0.5px solid rgba(45,122,69,.2);color:var(--green);border-radius:6px;font-size:11.5px;cursor:pointer;font-family:var(--font);font-weight:500}
.bok:hover{background:rgba(45,122,69,.15)}
.bno{padding:5px 14px;background:transparent;border:0.5px solid var(--border);color:var(--text2);border-radius:6px;font-size:11.5px;cursor:pointer;font-family:var(--font)}
.bno:hover{border-color:var(--coral);color:var(--coral)}
.emp{padding:24px;text-align:center;color:var(--text3);font-size:12px}

/* ===== DIRECTIVE BAR ===== */
.dirbar{display:flex;gap:8px;margin-bottom:14px}
.dirbar input{flex:1;padding:9px 14px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--text);outline:none}
.dirbar input:focus{border-color:#CBC9C4}
.dirbar select{padding:9px 10px;border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font);color:var(--text2);background:var(--card);outline:none}
.dirbar button{padding:9px 18px;background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);white-space:nowrap}
.dirbar button:hover{opacity:.85}

/* ===== ACTIVITY FEED ===== */
.fi{display:flex;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.fi:last-child{border-bottom:none}
.fav{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;font-family:var(--serif)}
.fb{flex:1;min-width:0}.fn{font-size:12px;font-weight:500}
.fa{font-size:11.5px;color:var(--text2);line-height:1.4}.fa.al{color:var(--coral)}
.ft{font-size:10.5px;color:var(--text3);white-space:nowrap;flex-shrink:0;padding-top:2px}

/* ===== MESSAGES BAR ===== */
.msgbar{display:flex;gap:8px;margin-bottom:14px}
.msgbar select{padding:8px 10px;border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font);color:var(--text2);background:var(--card);outline:none}
.msgbar input{flex:1;padding:8px 14px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--text);outline:none}
.msgbar input:focus{border-color:#CBC9C4}
.msgbar button{padding:8px 16px;background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;font-family:var(--font)}

/* ===== INBOX DETAIL OVERLAY ===== */
.inbox-detail{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:150;display:flex;align-items:center;justify-content:center}
.inbox-detail .card{background:var(--card);border-radius:var(--radius);max-width:560px;width:90%;max-height:80vh;overflow-y:auto;padding:28px}
.inbox-detail .close{float:right;background:none;border:0.5px solid var(--border);border-radius:6px;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center}
.inbox-detail .close:hover{background:var(--bg)}
.inbox-detail h3{font-size:16px;font-weight:500;margin-bottom:4px}
.inbox-detail .from{font-size:12px;color:var(--amber);font-weight:500;margin-bottom:12px}
.inbox-detail .body{font-size:13px;line-height:1.65;color:var(--text2);white-space:pre-wrap}
.inbox-detail .reply-btn{margin-top:16px;padding:7px 18px;background:var(--text);color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-family:var(--font)}

/* ===== CHAT PANEL ===== */
.cpanel{position:fixed;top:0;right:0;bottom:0;width:420px;background:var(--card);border-left:0.5px solid var(--border);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.cpanel.open{transform:translateX(0)}
.chdr{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.cav2{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:var(--serif);flex-shrink:0}
.cnm{font-size:14px;font-weight:500;flex:1}
.crl{font-size:11px;color:var(--text3)}
.cclose{width:28px;height:28px;border-radius:7px;border:0.5px solid var(--border);background:none;cursor:pointer;font-size:18px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.cclose:hover{background:var(--bg)}
.cmsgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:88%;line-height:1.55;font-size:13px;padding:10px 14px;border-radius:12px;white-space:pre-wrap;word-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--text);color:#fff;border-radius:12px 12px 2px 12px}
.msg.agent{align-self:flex-start;background:var(--bg);border:0.5px solid var(--border);border-radius:12px 12px 12px 2px}
.cinput-row{display:flex;gap:8px;padding:14px 16px;border-top:0.5px solid var(--border);flex-shrink:0}
.cinput{flex:1;padding:10px 14px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--text);outline:none;resize:none;min-height:42px;max-height:120px}
.cinput:focus{border-color:#CBC9C4}
.csend{padding:10px 16px;background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font)}
.csend:hover{opacity:.85}.csend:disabled{opacity:.4;cursor:not-allowed}
.ldot{display:inline-flex;gap:3px;padding:2px 0}
.ldot span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:ld 1.2s infinite}
.ldot span:nth-child(2){animation-delay:.2s}.ldot span:nth-child(3){animation-delay:.4s}
@keyframes ld{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;height:100vh;align-items:center;justify-content:center;font-family:Inter,sans-serif;color:#A3A09A;font-size:13px">Loading Penthouse...</div></div>

<!-- CHAT PANEL (fixed) -->
<div class="cpanel" id="cp">
<div class="chdr">
  <div class="cav2" id="cav"></div>
  <div><div class="cnm" id="cnm"></div><div class="crl" id="crl"></div></div>
  <button class="cclose" onclick="closeChat()">&times;</button>
</div>
<div class="cmsgs" id="cmsgs"></div>
<div class="cinput-row">
  <textarea class="cinput" id="ci" placeholder="Message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
  <button class="csend" id="csend" onclick="sendChat()">Send</button>
</div>
</div>

<!-- INBOX DETAIL (hidden) -->
<div id="inbox-overlay" style="display:none"></div>

<script>
const SB='https://zilgxvcrzlxuqcktemyl.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppbGd4dmNyemx4dXFja3RlbXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjIxOTAsImV4cCI6MjA5MDAzODE5MH0.LeG5w1ho6gagyBwK4AY8mjvOLKFj5_LDpck8UWFkRnw';
const PROXY=SB+'/functions/v1/claude-proxy';

/* ---- AGENT COLORS ---- */
const COLORS={
  oliver:['#BA7517','#FFF9F0'],
  roger:['#0F7A6B','#E8F5F3'],
  social_sarah:['#C4402E','#FDF0EE'],
  peter_paid_ads:['#2855A8','#EEF2FB'],
  emille_email:['#5E3FB0','#F2EEF9'],
  preston_pr:['#2855A8','#EEF2FB'],
  webster:['#0F7A6B','#E8F5F3'],
  david_orchestrator:['#BA7517','#FFF9F0'],
  remy_orchestrator:['#6B6A65','#F0EFED'],
  lead_scoring:['#BA7517','#FFF9F0']
};
function agentColor(n){return (COLORS[n]||['#6B6A65','#F0EFED'])[0]}
function agentBg(n){return (COLORS[n]||['#6B6A65','#F0EFED'])[1]}

/* ---- STATE ---- */
let ST={
  persona:'ben', defs:[], defsMap:{}, health:{}, logs:[], queue:[], inbox:[], hmMsgs:[], directives:[], brief:null,
  chatAgent:null, chatMsgs:[], streaming:false, unread:{ben:0,fields:0,remy:0,zach:0}
};

/* ---- API ---- */
async function q(table,params=''){
  const r=await fetch(SB+'/rest/v1/'+table+params,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
  if(!r.ok)return [];return r.json();
}
async function patch(table,filter,body){
  await fetch(SB+'/rest/v1/'+table+'?'+filter,{method:'PATCH',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});
}
async function post(table,body){
  await fetch(SB+'/rest/v1/'+table,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});
}

/* ---- HELPERS ---- */
function ago(ts){
  if(!ts)return 'never';
  const d=Math.round((Date.now()-new Date(ts))/60000);
  if(d<1)return 'just now';if(d<60)return d+'m ago';
  if(d<1440)return Math.round(d/60)+'h ago';return Math.round(d/1440)+'d ago';
}
function gt(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ---- DATA LOADING ---- */
async function loadAll(){
  const cut=new Date(Date.now()-86400000).toISOString();
  const [defs,queue,logs,inboxAll,hmMsgs,directives,brief]=await Promise.all([
    q('agent_definitions','?select=agent_name,display_name,domain,status,primary_job,persona,owner&order=domain'),
    q('sarah_approval_queue','?select=*&status=eq.pending&order=created_at.desc&limit=15'),
    q('agent_logs','?select=agent_name,action,status,created_at,error&created_at=gte.'+cut+'&order=created_at.desc&limit=400'),
    q('persona_inbox','?select=*&order=created_at.desc&limit=50'),
    q('cowork_messages','?select=*&order=created_at.desc&limit=30'),
    q('ben_directives','?select=*&status=eq.pending&order=created_at.desc&limit=20'),
    q('roger_nightly_brief','?select=*&order=created_at.desc&limit=1')
  ]);
  const h={};
  for(const l of(logs||[])){
    if(!h[l.agent_name])h[l.agent_name]={t:0,e:0,last:l.created_at,act:l.action,err:null};
    h[l.agent_name].t++;
    if(l.status==='error'){h[l.agent_name].e++;if(!h[l.agent_name].err)h[l.agent_name].err=l.error;}
    if(l.created_at>h[l.agent_name].last){h[l.agent_name].last=l.created_at;h[l.agent_name].act=l.action;}
  }
  const dm={};for(const a of(defs||[]))dm[a.agent_name]=a;
  const ur={ben:0,fields:0,remy:0,zach:0};
  for(const m of(inboxAll||[])){
    if(m.status==='unread'||m.unread===true){
      const p=(m.to_persona||'').toLowerCase();
      if(ur[p]!==undefined)ur[p]++;
    }
  }
  ST={...ST, defs:defs||[], defsMap:dm, health:h, logs:(logs||[]).slice(0,20), queue:queue||[],
    inbox:inboxAll||[], hmMsgs:hmMsgs||[], directives:directives||[], brief:(brief&&brief[0])||null, unread:ur};
}

/* ---- RENDER AGENT CARD ---- */
function renderAgentCard(a){
  const h=ST.health[a.agent_name]||{t:0,e:0,last:null,act:'No runs',err:null};
  const rate=h.t>0?h.e/h.t:0;
  const pc=h.t===0?'p-u':rate>=.5?'p-e':rate>=.15?'p-d':'p-h';
  const sc=pc==='p-h'?'var(--green)':pc==='p-d'?'var(--amber)':pc==='p-e'?'var(--coral)':'var(--text3)';
  const sl=h.t===0?'No runs':pc==='p-e'?'Errors':pc==='p-d'?'Degraded':'Healthy';
  const col=agentColor(a.agent_name),bg=agentBg(a.agent_name);
  const av=(a.display_name||a.agent_name)[0];
  return `<div class="ac" onclick="openChat('${a.agent_name}')">
    <div class="acb"></div>
    <div class="act"><div class="av" style="background:${bg};color:${col}">${av}</div><div><div class="an">${esc(a.display_name||a.agent_name)}</div><div class="ar">${esc(a.domain||'')}</div></div></div>
    <div class="as"><div class="pip ${pc}"></div><span class="asl" style="color:${sc}">${sl}</span><span style="margin-left:auto;font-size:10px;color:var(--text3)">${ago(h.last)}</span></div>
    <button class="cbtn" onclick="event.stopPropagation();openChat('${a.agent_name}')">Talk to ${esc(a.display_name||av)}</button>
  </div>`;
}

/* ---- RENDER INBOX ITEM ---- */
function renderInboxItem(m){
  const unread=(m.status==='unread'||m.unread===true);
  return `<div class="inb${unread?' unread':''}" onclick="openInbox('${m.id}')">
    <div class="inbt"><span class="inbf">${esc(m.from_persona||m.from_name||'Agent')}</span><span class="inbm">${ago(m.created_at)}</span></div>
    <div class="inbs">${esc(m.subject||'(No subject)')}</div>
    <div class="inbp">${esc((m.body||'').substring(0,120))}</div>
  </div>`;
}

/* ---- RENDER DIRECTIVE ITEM ---- */
function renderDirectiveItem(d){
  const urg=d.urgency==='critical'?'urg':d.urgency==='high'?'high':'norm';
  return `<div class="di">
    <div class="dit"><div class="din">${esc(d.title||'Untitled')}</div><span class="dib ${urg}">${esc(d.urgency||'normal')}</span><span class="dim">${ago(d.created_at)}</span></div>
    <div class="dip">${esc((d.directive||'').substring(0,140))}</div>
  </div>`;
}

/* ---- RENDER QUEUE ITEM ---- */
function renderQueueItem(item){
  const hook=esc((item.preview_hook||item.preview_caption||'').substring(0,120));
  return `<div class="qi${item.priority==='urgent'?' pr':''}">
    <div class="qit"><span class="qif" style="color:var(--coral)">Sarah</span><span class="qiy">${esc(item.content_type||'Content')}</span>${item.priority==='urgent'?'<span class="qig">Urgent</span>':''}<span class="qim">${ago(item.created_at)}</span></div>
    <div class="qin">${esc(item.content_type||'Content')}</div>
    <div class="qip">${hook}</div>
    <div class="qia"><button class="bok" onclick="approveQ('${item.id}')">Approve</button><button class="bno" onclick="rejectQ('${item.id}')">Send back</button></div>
  </div>`;
}

/* ---- RENDER FEED ITEM ---- */
function renderFeedItem(l){
  const col=agentColor(l.agent_name),isE=l.status==='error';
  return `<div class="fi"><div class="fav" style="background:${col}12;color:${col}">${(l.agent_name||'?')[0].toUpperCase()}</div><div class="fb"><div class="fn">${esc(l.agent_name.replace(/_/g,' '))}</div><div class="fa${isE?' al':''}">${esc(l.action.replace(/_/g,' '))}</div>${isE&&l.error?`<div class="ferr">${esc(l.error.substring(0,70))}</div>`:''}</div><div class="ft">${ago(l.created_at)}</div></div>`;
}

/* ====== VIEW RENDERERS ====== */

function renderBenView(){
  const m=ST.logs.length,e=ST.logs.filter(x=>x.status==='error').length;
  const er=m>0?Math.round(e/m*100):0;
  const myInbox=ST.inbox.filter(x=>(x.to_persona||'').toLowerCase()==='ben');
  const unreadInbox=myInbox.filter(x=>x.status==='unread'||x.unread===true);

  let html='';

  /* BRIEF HERO */
  if(ST.brief){
    html+=`<div class="brief"><div class="bw">Roger Brief</div><div class="bt"><strong>${esc(ST.brief.hook_to_use_immediately||'No hook today')}</strong>${esc(ST.brief.top_content_pattern_today||'')}</div></div>`;
  }

  /* METRIC STRIP */
  html+=`<div class="metrics">
    <div class="mc"><div class="mcl">Agents</div><div class="mv">${ST.defs.length}</div><div class="mx">online</div></div>
    <div class="mc"><div class="mcl">Approval</div><div class="mv">${ST.queue.length}</div><div class="mx">${ST.queue.length?'need sign-off':'clear'}</div></div>
    <div class="mc"><div class="mcl">Errors 24h</div><div class="mv" style="${er>30?'color:var(--coral)':''}">${e}</div><div class="mx">of ${m} runs</div></div>
    <div class="mc"><div class="mcl">Inbox</div><div class="mv" style="${unreadInbox.length?'color:var(--amber)':''}">${unreadInbox.length}</div><div class="mx">unread</div></div>
    <div class="mc"><div class="mcl">Directives</div><div class="mv">${ST.directives.length}</div><div class="mx">pending</div></div>
  </div>`;

  /* DIRECTIVE BAR */
  html+=`<div style="padding:20px 28px 0"><div class="sbox"><div class="sh2"><div class="st">Post Directive</div><div class="ss">Goes to Oliver</div></div>
    <div class="dirbar">
      <input type="text" id="dir-title" placeholder="Directive title...">
      <select id="dir-urgency"><option value="normal">Normal</option><option value="high">High</option><option value="critical">Critical</option></select>
      <select id="dir-domain"><option value="marketing">Marketing</option><option value="sales">Sales</option><option value="operations">Ops</option><option value="technical">Technical</option></select>
      <button onclick="postDirective()">Post</button>
    </div>
    <input type="text" id="dir-body" placeholder="Details (optional)..." style="width:100%;padding:9px 14px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--text);outline:none">
  </div></div>`;

  /* TWO-COLUMN: INBOX + DIRECTIVES */
  html+=`<div class="grid"><div class="left">`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Inbox</div><div class="bdg">${unreadInbox.length} unread</div></div>${myInbox.length?myInbox.slice(0,10).map(renderInboxItem).join(''):'<div class="emp">No messages yet.</div>'}</div>`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Approval Queue</div><div class="ss">${ST.queue.length?ST.queue.length+' waiting':'Clear'}</div></div>${ST.queue.length?ST.queue.map(renderQueueItem).join(''):'<div class="emp">Nothing waiting.</div>'}</div>`;
  html+=`</div><div class="right">`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Directives</div><div class="ss">${ST.directives.length} pending</div></div>${ST.directives.length?ST.directives.slice(0,10).map(renderDirectiveItem).join(''):'<div class="emp">No pending directives.</div>'}</div>`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Team Messages</div><div class="ss">Internal</div></div>
    <div class="msgbar">
      <select id="msg-to"><option value="fields">Fields</option><option value="remy">Remy</option><option value="zach">Zach</option></select>
      <input type="text" id="msg-body" placeholder="Message...">
      <button onclick="sendHumanMsg()">Send</button>
    </div>
    ${ST.hmMsgs.slice(0,6).map(m=>`<div class="fi"><div class="fav" style="background:var(--ambg);color:var(--amber)">${(m.from_persona||'?')[0].toUpperCase()}</div><div class="fb"><div class="fn">${esc(m.from_persona||'')} &#8594; ${esc(m.to_persona||'')}</div><div class="fa">${esc((m.body||m.subject||'').substring(0,80))}</div></div><div class="ft">${ago(m.created_at)}</div></div>`).join('')}
  </div>`;
  html+=`</div></div>`;

  /* AGENT GRID */
  html+=`<div style="padding:0 28px 40px"><div class="sbox"><div class="sh2"><div class="st">Your Team</div><div class="ss">${ST.defs.length} agents</div></div><div class="ag">${ST.defs.map(renderAgentCard).join('')}</div></div></div>`;

  return html;
}

function renderFieldsView(){
  const myInbox=ST.inbox.filter(x=>(x.to_persona||'').toLowerCase()==='fields');
  const unread=myInbox.filter(x=>x.status==='unread'||x.unread===true);
  const myAgents=ST.defs.filter(a=>['preston_pr','social_sarah','emille_email','lead_scoring','peter_paid_ads','david_orchestrator'].includes(a.agent_name));
  let html=`<div class="metrics">
    <div class="mc"><div class="mcl">Inbox</div><div class="mv" style="${unread.length?'color:var(--amber)':''}">${unread.length}</div><div class="mx">unread</div></div>
    <div class="mc"><div class="mcl">My Agents</div><div class="mv">${myAgents.length}</div><div class="mx">active</div></div>
    <div class="mc"><div class="mcl">Content Queue</div><div class="mv">${ST.queue.length}</div><div class="mx">items</div></div>
  </div>`;
  html+=`<div class="grid"><div class="left">`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Inbox</div><div class="bdg">${unread.length} unread</div></div>${myInbox.length?myInbox.slice(0,10).map(renderInboxItem).join(''):'<div class="emp">No messages.</div>'}</div>`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Content Queue</div></div>${ST.queue.length?ST.queue.map(renderQueueItem).join(''):'<div class="emp">Nothing waiting.</div>'}</div>`;
  html+=`</div><div class="right">`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Activity</div><div class="bdg gr">Live</div></div>${ST.logs.slice(0,12).map(renderFeedItem).join('')}</div>`;
  html+=`</div></div>`;
  html+=`<div style="padding:0 28px 40px"><div class="sbox"><div class="sh2"><div class="st">Your Agents</div></div><div class="ag">${myAgents.map(renderAgentCard).join('')}</div></div></div>`;
  return html;
}

function renderRemyView(){
  const myInbox=ST.inbox.filter(x=>(x.to_persona||'').toLowerCase()==='remy');
  const unread=myInbox.filter(x=>x.status==='unread'||x.unread===true);
  const errCount=ST.logs.filter(x=>x.status==='error').length;
  const errAgents=[...new Set(ST.logs.filter(x=>x.status==='error').map(x=>x.agent_name))];
  let html=`<div class="metrics">
    <div class="mc"><div class="mcl">Errors 24h</div><div class="mv" style="${errCount>0?'color:var(--coral)':''}">${errCount}</div><div class="mx">${errAgents.length} agents affected</div></div>
    <div class="mc"><div class="mcl">Inbox</div><div class="mv" style="${unread.length?'color:var(--amber)':''}">${unread.length}</div><div class="mx">unread</div></div>
    <div class="mc"><div class="mcl">Total Runs</div><div class="mv">${ST.logs.length}</div><div class="mx">last 24h</div></div>
  </div>`;
  if(errAgents.length){html+=`<div class="brief"><div class="bw">Ops Alert</div><div class="bt"><strong>Errors in: ${errAgents.join(', ')}</strong></div></div>`;}
  html+=`<div class="grid"><div class="left">`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Inbox</div><div class="bdg">${unread.length} unread</div></div>${myInbox.length?myInbox.slice(0,10).map(renderInboxItem).join(''):'<div class="emp">No messages.</div>'}</div>`;
  const errLogs=ST.logs.filter(x=>x.status==='error');
  html+=`<div class="sbox"><div class="sh2"><div class="st">Error Log</div><div class="bdg" style="color:var(--coral)">${errLogs.length}</div></div>${errLogs.length?errLogs.slice(0,15).map(renderFeedItem).join(''):'<div class="emp">No errors.</div>'}</div>`;
  html+=`</div><div class="right">`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Activity</div><div class="bdg gr">Live</div></div>${ST.logs.slice(0,15).map(renderFeedItem).join('')}</div>`;
  html+=`</div></div>`;
  html+=`<div style="padding:0 28px 40px"><div class="sbox"><div class="sh2"><div class="st">Agent Health</div></div><div class="ag">${ST.defs.map(renderAgentCard).join('')}</div></div></div>`;
  return html;
}

function renderZachView(){
  const myInbox=ST.inbox.filter(x=>(x.to_persona||'').toLowerCase()==='zach');
  const unread=myInbox.filter(x=>x.status==='unread'||x.unread===true);
  const jobs=ST.directives.filter(d=>d.domain==='technical'||d.created_by==='oliver');
  let html=`<div class="metrics">
    <div class="mc"><div class="mcl">Jobs</div><div class="mv" style="${jobs.length?'color:var(--amber)':''}">${jobs.length}</div><div class="mx">pending</div></div>
    <div class="mc"><div class="mcl">Inbox</div><div class="mv" style="${unread.length?'color:var(--amber)':''}">${unread.length}</div><div class="mx">unread</div></div>
  </div>`;
  html+=`<div class="grid"><div class="left">`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Job Queue</div><div class="ss">${jobs.length} pending</div></div>`;
  if(jobs.length){
    html+=jobs.map(j=>`<div class="qi"><div class="qit"><span class="qif" style="color:var(--amber)">${esc(j.created_by||'system')}</span><span class="qiy">${esc(j.domain||'')}</span><span class="qig">${esc(j.urgency||'normal')}</span><span class="qim">${ago(j.created_at)}</span></div><div class="qin">${esc(j.title||'Untitled')}</div><div class="qip">${esc((j.directive||'').substring(0,200))}</div></div>`).join('');
  } else { html+='<div class="emp">No pending jobs.</div>'; }
  html+=`</div>`;
  html+=`</div><div class="right">`;
  html+=`<div class="sbox"><div class="sh2"><div class="st">Inbox</div><div class="bdg">${unread.length} unread</div></div>${myInbox.length?myInbox.slice(0,10).map(renderInboxItem).join(''):'<div class="emp">No messages.</div>'}</div>`;
  html+=`</div></div>`;
  html+=`<div style="padding:0 28px 40px"><div class="sbox"><div class="sh2"><div class="st">Talk to Agents</div></div><div class="ag">${ST.defs.slice(0,6).map(renderAgentCard).join('')}</div></div></div>`;
  return html;
}

/* ====== MAIN RENDER ====== */
function render(){
  const views={ben:renderBenView,fields:renderFieldsView,remy:renderRemyView,zach:renderZachView};
  const viewHtml=(views[ST.persona]||renderBenView)();
  const personas=[{id:'ben',label:'Ben'},{id:'fields',label:'Fields'},{id:'remy',label:'Remy'},{id:'zach',label:'Zach'}];
  const tabs=personas.map(p=>{
    const u=ST.unread[p.id]||0;
    return `<button class="ptab${ST.persona===p.id?' active':''}" onclick="switchPersona('${p.id}')">${p.label}${u>0?`<span class="badge">${u}</span>`:''}</button>`;
  }).join('');
  document.getElementById('app').innerHTML=`<div>
    <div class="hdr">
      <div class="logo">Penthouse</div>
      <div class="persona-tabs">${tabs}</div>
      <div class="hr2">
        <div class="live"><div class="lp"></div>Live</div>
        <div class="clk">${gt()}</div>
        <button class="rfbtn" onclick="refresh()">Refresh</button>
      </div>
    </div>
    ${viewHtml}
  </div>`;
}

/* ====== ACTIONS ====== */
window.switchPersona=function(p){ST.persona=p;render();};
window.refresh=async function(){await loadAll();render();};
window.approveQ=async function(id){
  await patch('sarah_approval_queue','id=eq.'+id,{status:'approved'});
  ST.queue=ST.queue.filter(x=>x.id!==id);render();
};
window.rejectQ=async function(id){
  await patch('sarah_approval_queue','id=eq.'+id,{status:'rejected'});
  ST.queue=ST.queue.filter(x=>x.id!==id);render();
};
window.postDirective=async function(){
  const title=document.getElementById('dir-title')?.value?.trim();
  const body=document.getElementById('dir-body')?.value?.trim();
  const urgency=document.getElementById('dir-urgency')?.value||'normal';
  const domain=document.getElementById('dir-domain')?.value||'marketing';
  if(!title)return alert('Enter a directive title');
  await post('ben_directives',{title,directive:body||title,urgency,domain,status:'pending',created_by:ST.persona});
  document.getElementById('dir-title').value='';document.getElementById('dir-body').value='';
  await loadAll();render();
};
window.sendHumanMsg=async function(){
  const to=document.getElementById('msg-to')?.value;
  const body=document.getElementById('msg-body')?.value?.trim();
  if(!body)return;
  await post('cowork_messages',{from_persona:ST.persona,to_persona:to,body,subject:body.substring(0,60),status:'unread',message_type:'text'});
  document.getElementById('msg-body').value='';await loadAll();render();
};
window.openInbox=async function(id){
  const msg=ST.inbox.find(x=>x.id===id);if(!msg)return;
  if(msg.status==='unread'||msg.unread===true){
    await patch('persona_inbox','id=eq.'+id,{status:'read',unread:false});
    msg.status='read';msg.unread=false;ST.unread[ST.persona]=Math.max(0,(ST.unread[ST.persona]||0)-1);render();
  }
  const ol=document.getElementById('inbox-overlay');ol.style.display='flex';
  ol.innerHTML=`<div class="inbox-detail" onclick="if(event.target===this)closeInbox()"><div class="card">
    <button class="close" onclick="closeInbox()">&times;</button>
    <div class="from">From: ${esc(msg.from_persona||msg.from_name||'Agent')}</div>
    <h3>${esc(msg.subject||'(No subject)')}</h3>
    <div class="body">${esc(msg.body||'(No content)')}</div>
    ${msg.from_persona&&ST.defsMap[msg.from_persona]?`<button class="reply-btn" onclick="closeInbox();openChat('${msg.from_persona}')">Reply via Chat</button>`:''}
  </div></div>`;
};
window.closeInbox=function(){document.getElementById('inbox-overlay').style.display='none';};

/* ====== CHAT ====== */
window.openChat=function(name){
  const a=ST.defsMap[name];if(!a)return;
  ST.chatAgent=a;ST.chatMsgs=[];
  const col=agentColor(name),bg=agentBg(name);
  document.getElementById('cav').style.cssText='background:'+bg+';color:'+col;
  document.getElementById('cav').textContent=(a.display_name||name)[0];
  document.getElementById('cnm').textContent=a.display_name||name;
  document.getElementById('crl').textContent=a.domain||name;
  document.getElementById('cmsgs').innerHTML='';document.getElementById('ci').value='';
  document.getElementById('cp').classList.add('open');document.getElementById('ci').focus();
};
window.closeChat=function(){document.getElementById('cp').classList.remove('open');};
window.sendChat=async function(){
  if(ST.streaming||!ST.chatAgent)return;
  const input=document.getElementById('ci');const text=input.value.trim();if(!text)return;
  input.value='';addChatMsg('user',text);ST.chatMsgs.push({role:'user',content:text});
  const msgs=document.getElementById('cmsgs');
  const ld=document.createElement('div');ld.className='msg agent';
  ld.innerHTML='<div class="ldot"><span></span><span></span><span></span></div>';
  msgs.appendChild(ld);msgs.scrollTop=msgs.scrollHeight;
  ST.streaming=true;document.getElementById('csend').disabled=true;
  const a=ST.chatAgent;
  const sys=`You are ${a.display_name||a.agent_name}, an AI agent on the Ben Lalez real estate team in Chicago. ${a.primary_job||''} You are speaking with ${ST.persona}. Be direct, concise, and helpful. Use your persona and expertise.`;
  try{
    const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:sys,messages:ST.chatMsgs})});
    const data=await res.json();ld.remove();
    const reply=data.content?.[0]?.text||data.error||'No response';
    addChatMsg('agent',reply);ST.chatMsgs.push({role:'assistant',content:reply});
  }catch(e){ld.remove();addChatMsg('agent','Error: '+e.message);}
  ST.streaming=false;document.getElementById('csend').disabled=false;
};
function addChatMsg(role,text){
  const msgs=document.getElementById('cmsgs');
  const d=document.createElement('div');d.className='msg '+role;d.textContent=text;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}

/* ====== BOOT ====== */
(async()=>{
  try{await loadAll();render();}catch(e){document.getElementById('app').innerHTML=`<div style="padding:40px;color:var(--coral)">Error loading: ${e.message}</div>`;}
  setInterval(async()=>{try{await loadAll();render();}catch(e){}},60000);
})();
</script>
</body>
</html>
